name: Upload WG materials to datatracker

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no uploads)'
        type: boolean
        default: true
      meeting:
        description: 'Override meeting number (optional)'
        default: ''
      material:
        description: 'Restrict to agenda/minutes/slides (optional)'
        default: ''
  # Automatic push-triggered uploads are DISABLED until the WG enables them.
  # Once validated, uncomment to upload on every change to material files:
  # push:
  #   branches: [main]
  #   paths:
  #     - '*/agenda.md'
  #     - '*/minutes.md'
  #     - '*/slides-*'

concurrency:
  group: upload-materials
  cancel-in-progress: false

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 2
      - uses: ekinnear/wg-materials-template@main
        with:
          make: upload
          # push events force a real upload. Manual runs honour the dry_run input (default true)
          dry-run: ${{ github.event_name == 'push' && 'false' || inputs.dry_run }}
          meeting: ${{ inputs.meeting }}
          material: ${{ inputs.material }}
          before: ${{ github.event.before }}
          after: ${{ github.sha }}
          user: ${{ secrets.DATATRACKER_USER }}
          password: ${{ secrets.DATATRACKER_PASSWORD }}
